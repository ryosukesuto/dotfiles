name: PR Review (Claude Code - Formal)

on:
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review]
  issue_comment:
    types: [created]

permissions:
  contents: read
  pull-requests: write
  checks: write
  issues: write

jobs:
  review:
    name: Claude Code Review
    runs-on: ubuntu-latest
    if: |
      (github.event_name == 'pull_request' && github.event.pull_request.draft == false) ||
      (github.event_name == 'issue_comment' && github.event.issue.pull_request && contains(github.event.comment.body, '/re-review') &&
       (github.event.comment.author_association == 'MEMBER' || github.event.comment.author_association == 'OWNER' || github.event.comment.author_association == 'COLLABORATOR'))
    timeout-minutes: 10
    env:
      PR_NUMBER: ${{ github.event.pull_request.number || github.event.issue.number }}
    steps:
      - name: Get PR head ref
        if: github.event_name == 'issue_comment'
        id: pr_ref
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          HEAD_SHA=$(gh pr view "$PR_NUMBER" --repo "$GITHUB_REPOSITORY" --json headRefOid --jq '.headRefOid')
          echo "sha=$HEAD_SHA" >> "$GITHUB_OUTPUT"

      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          fetch-depth: 0
          persist-credentials: false
          ref: ${{ steps.pr_ref.outputs.sha || '' }}

      - name: Install Claude Code
        run: npm install -g @anthropic-ai/claude-code

      - name: Fetch PR diff
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh pr diff "$PR_NUMBER" > /tmp/pr-diff.txt
          DIFF_LINES=$(wc -l < /tmp/pr-diff.txt)
          echo "PR diff: $DIFF_LINES lines"

      - name: Build review prompt
        env:
          PR_TITLE: ${{ github.event.pull_request.title || github.event.issue.title }}
        run: |
          cat <<PROMPT_EOF > /tmp/claude-prompt.txt
          あなたは {{REVIEWER_ROLE}} です。
          PR #${PR_NUMBER}: ${PR_TITLE} をレビューしてください。

          ## PR の差分
          ---
          PROMPT_EOF
          head -3000 /tmp/pr-diff.txt >> /tmp/claude-prompt.txt
          cat <<'PROMPT_EOF' >> /tmp/claude-prompt.txt

          ---

          ## あなたの役割

          1. トリアージ: diff サイズ・変更パス・影響範囲を分類
          2. ロジック・設計レビュー: セキュリティ、設計の妥当性
          3. 既存コードとの一貫性チェックは Greptile が担当するため、そちらには踏み込まない

          {{REVIEW_CRITERIA}}

          ## 優先度ラベル

          - [P0] 本番障害・セキュリティリスクに直結
          - [P1] 運用障害・設定不整合のリスク
          - [P2] コード品質・保守性の改善
          - [P3] 軽微な改善提案

          ## 出力ルール

          - 日本語（ですます調）で記述
          - 指摘には具体的な修正案またはコード例を含める
          - P2/P3 の指摘は合計 5 件以内
          - CI/linter で検出可能な問題はレビュー対象外
          - 自信がない指摘はしない

          ## 出力形式

          1行目は必ず以下のどちらかの形式にすること:
          APPROVE: <1行サマリ>
          REQUEST_CHANGES: <1行サマリ>

          2行目以降: 優先度順に指摘を列挙
          PROMPT_EOF

      - name: Review with Claude
        id: review
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: |
          REVIEW=$(cat /tmp/claude-prompt.txt | claude --model sonnet --print)
          echo "$REVIEW" > /tmp/review-output.txt
          FIRST_LINE=$(head -1 /tmp/review-output.txt)
          if [[ "$FIRST_LINE" == APPROVE:* ]]; then
            echo "decision=approve" >> "$GITHUB_OUTPUT"
          else
            echo "decision=request_changes" >> "$GITHUB_OUTPUT"
          fi

      - name: Submit approval
        if: steps.review.outputs.decision == 'approve'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          REVIEW_BODY=$(cat /tmp/review-output.txt)
          gh pr review "$PR_NUMBER" \
            --approve --body "$REVIEW_BODY"

      - name: Submit change request
        if: steps.review.outputs.decision == 'request_changes'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          REVIEW_BODY=$(cat /tmp/review-output.txt)
          gh pr review "$PR_NUMBER" \
            --request-changes --body "$REVIEW_BODY"

      - name: Upload review logs
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: review-logs-pr${{ env.PR_NUMBER }}
          path: |
            /tmp/claude-prompt.txt
            /tmp/review-output.txt
          retention-days: 30
