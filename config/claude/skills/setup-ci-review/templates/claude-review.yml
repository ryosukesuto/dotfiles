name: PR Review (Claude Code)

on:
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review]
  issue_comment:
    types: [created]

concurrency:
  # issue_comment では cancel-in-progress を無効化する。
  # Claude bot 自身のコメントが issue_comment をトリガーし、実行中のレビューを
  # キャンセルする自己キャンセルループが発生するのを防ぐ。
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.event.issue.number }}
  cancel-in-progress: ${{ github.event_name != 'issue_comment' }}

permissions:
  contents: read
  pull-requests: write
  issues: write
  # 必須: anthropics/claude-code-action は ANTHROPIC_API_KEY 直接認証でも内部で OIDC token を要求する。削除すると fail する
  id-token: write
  actions: read

jobs:
  review:
    name: Claude Code Review
    runs-on: ubuntu-latest
    if: |
      (github.event_name == 'pull_request' && github.event.pull_request.draft == false) ||
      (github.event_name == 'issue_comment' && github.event.issue.pull_request &&
       startsWith(github.event.comment.body, '@claude') &&
       github.actor != 'claude[bot]' &&
       (github.event.comment.author_association == 'MEMBER' || github.event.comment.author_association == 'OWNER' || github.event.comment.author_association == 'COLLABORATOR'))
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0

      # issue_comment トリガーは default branch をチェックアウトするため、PR ブランチに切り替える
      - name: Checkout PR branch
        if: github.event_name == 'issue_comment'
        run: gh pr checkout ${{ github.event.issue.number }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      # force-push 検出: 追加コミットレビューとフルレビューの切り替えに使う
      - name: Detect review context
        id: context
        run: |
          ACTION="${{ github.event.action }}"
          echo "action=$ACTION" >> "$GITHUB_OUTPUT"

          if [ "$ACTION" = "synchronize" ]; then
            BEFORE="${{ github.event.before }}"
            AFTER="${{ github.event.after }}"
            echo "before=$BEFORE" >> "$GITHUB_OUTPUT"
            echo "after=$AFTER" >> "$GITHUB_OUTPUT"

            if git merge-base --is-ancestor "$BEFORE" "$AFTER" 2>/dev/null; then
              echo "force_push=false" >> "$GITHUB_OUTPUT"
            else
              echo "force_push=true" >> "$GITHUB_OUTPUT"
            fi
          fi

      # v1.0.72 を使用: mcp__github_inline_comment__create_inline_comment が組み込みで利用可能
      # v1.0.101 以降ではこの MCP server が削除されているため使えない（ダウングレード必須）
      - uses: anthropics/claude-code-action@cd77b50d2b0808657f8e6774085c8bf54484351c # v1.0.72
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          allowed_bots: "dependabot[bot],renovate[bot]"
          display_report: true
          prompt: |
            REPO: ${{ github.repository }}
            PR NUMBER: ${{ github.event.pull_request.number || github.event.issue.number }}
            EVENT_ACTION: ${{ steps.context.outputs.action || github.event.action }}
            BEFORE_SHA: ${{ steps.context.outputs.before }}
            AFTER_SHA: ${{ steps.context.outputs.after }}
            FORCE_PUSH: ${{ steps.context.outputs.force_push }}

            PR ブランチは既にカレントディレクトリにチェックアウト済みです。
            `.claude/skills/claude-code-review/SKILL.md` を Read で読み込み、その内容に従ってこのPRをレビューしてください。
          claude_args: |
            --model claude-opus-4-5
            --max-turns 30
            --allowedTools "mcp__github_inline_comment__create_inline_comment,Bash(gh pr comment:*),Bash(gh pr diff:*),Bash(gh pr view:*),Bash(gh pr review:*),Bash(gh api repos/*/issues/*/comments:*),Bash(gh api --method PATCH repos/*/issues/comments/*:*),Bash(find:*),Bash(cat:*),Bash(grep:*),Bash(ls:*),Bash(git diff:*),Bash(git log:*),WebSearch,WebFetch(domain:pkg.go.dev),WebFetch(domain:github.com),WebFetch(domain:raw.githubusercontent.com)"

      # Claude がサマリコメントを投稿した後、レビュー最終判定（approve / request-changes）を
      # workflow 側で強制実行する。過去の実測で Claude がサマリ投稿後に `gh pr review` を
      # 省略するケースがあり、SKILL.md の文言強化だけでは防ぎきれないため workflow 側で補償する。
      - name: Finalize PR review decision
        if: always()
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO: ${{ github.repository }}
          PR_NUMBER: ${{ github.event.pull_request.number || github.event.issue.number }}
        run: |
          set -e

          # PR 番号が取れない場合はスキップ（workflow validation skip 等）
          if [ -z "$PR_NUMBER" ] || [ "$PR_NUMBER" = "null" ]; then
            echo "No PR number available. Skipping."
            exit 0
          fi

          # 現在の HEAD SHA に対して既に APPROVED / CHANGES_REQUESTED のレビューが存在すれば skip
          # - --paginate 必須: gh api はデフォルトで最大30件しか返さないため
          # - HEAD SHA 限定: CHANGES_REQUESTED は新コミット push でも自動 dismiss されないため、
          #   PR 全体で重複判定すると P0/P1 解消後も永遠に skip されてしまう
          HEAD_SHA=$(gh pr view "$PR_NUMBER" --json headRefOid --jq '.headRefOid' 2>/dev/null || echo "")
          EXISTING=$(gh api "repos/$REPO/pulls/$PR_NUMBER/reviews" --paginate \
            --jq --arg sha "$HEAD_SHA" '[.[] | select(.commit_id == $sha) | select(.state == "APPROVED" or .state == "CHANGES_REQUESTED")] | length' 2>/dev/null || echo "0")
          if [ "${EXISTING:-0}" -gt 0 ]; then
            echo "A review decision already exists ($EXISTING). Skipping."
            exit 0
          fi

          # <!-- claude-code-review --> マーカー付きコメントを取得（末尾=最新）
          COMMENT_BODY=$(gh api "repos/$REPO/issues/$PR_NUMBER/comments" --paginate \
            --jq '[.[] | select(.body | contains("<!-- claude-code-review -->"))] | last | .body' 2>/dev/null || echo "")

          if [ -z "$COMMENT_BODY" ] || [ "$COMMENT_BODY" = "null" ]; then
            echo "No Claude review summary comment found. Skipping final decision."
            exit 0
          fi

          # 最後の commit section（--- 以降の直近ブロック）から P0/P1 件数をパース
          # フォーマット例: "サマリ: P0: 0件 / P1: 0件 / P2: 0件 / P3: 0件"
          # ubuntu-latest の /usr/bin/awk は mawk で、複数文字 RS が動作しないため
          # 行単位で --- 行を検出して buffer をリセットする互換実装を使う
          LAST_SECTION=$(printf '%s\n' "$COMMENT_BODY" | awk '
            /^---[[:space:]]*$/ { buf = ""; next }
            { buf = (buf == "" ? $0 : buf "\n" $0) }
            END { print buf }
          ')
          P0=$(printf '%s' "$LAST_SECTION" | grep -oE 'P0:[[:space:]]*[0-9]+' | head -1 | grep -oE '[0-9]+' || echo "0")
          P1=$(printf '%s' "$LAST_SECTION" | grep -oE 'P1:[[:space:]]*[0-9]+' | head -1 | grep -oE '[0-9]+' || echo "0")
          P0="${P0:-0}"
          P1="${P1:-0}"
          echo "Parsed counts: P0=$P0 P1=$P1"

          if [ "$P0" -gt 0 ] || [ "$P1" -gt 0 ]; then
            gh pr review "$PR_NUMBER" --request-changes \
              -b "🤖 AIレビュー: 修正が必要な指摘があります（P0: ${P0}件 / P1: ${P1}件）。詳細は上のサマリコメントをご確認ください。"
          else
            gh pr review "$PR_NUMBER" --approve \
              -b "🤖 AIレビュー完了: 重大な問題（P0/P1）は検出されませんでした。"
          fi
