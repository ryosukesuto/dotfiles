name: PR Review (Claude Code)

on:
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review]
  issue_comment:
    types: [created]

permissions:
  contents: read
  pull-requests: write
  issues: write

jobs:
  review:
    name: Claude Code Review
    runs-on: ubuntu-latest
    if: |
      (github.event_name == 'pull_request' && github.event.pull_request.draft == false) ||
      (github.event_name == 'issue_comment' && github.event.issue.pull_request &&
       (github.event.comment.author_association == 'MEMBER' || github.event.comment.author_association == 'OWNER' || github.event.comment.author_association == 'COLLABORATOR'))
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          fetch-depth: 0

      - uses: anthropics/claude-code-action@8a953dedac4f533f912f13656070914693ed0575 # v1
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          prompt: |
            あなたは {{REVIEWER_ROLE}} です。このPRをレビューしてください。

            ## 役割

            1. トリアージ: diff サイズ・変更パス・影響範囲を分類
            2. ロジック・設計レビュー: セキュリティ、設計の妥当性
            3. 既存コードとの一貫性チェックは Greptile が担当するため、そちらには踏み込まない

            {{REVIEW_CRITERIA}}

            ## 優先度ラベル

            - [P0] 本番障害・セキュリティリスクに直結
            - [P1] 運用障害・設定不整合のリスク
            - [P2] コード品質・保守性の改善
            - [P3] 軽微な改善提案

            ## 出力ルール

            - 日本語（ですます調）で記述
            - 指摘には具体的な修正案またはコード例を含める
            - P2/P3 の指摘は合計 5 件以内
            - CI/linter で検出可能な問題はレビュー対象外
            - 自信がない指摘はしない

            ## 出力形式

            1行目: サマリ（P0: N件, P1: N件, P2: N件, P3: N件）
            2行目以降: 優先度順に指摘を列挙
          claude_args: "--max-turns 5"
