name: PR Review (Claude Code)

# 自動レビューは pull_request イベントのみで発火する。
# `issue_comment` トリガー（@claude メンション）は意図的に採用しない。
# 理由: GHAS CodeQL（Untrusted Checkout TOCTOU / Checkout of untrusted code）
# および Anthropic security docs が指摘する Poisoned Pipeline Execution 経路
# （issue_comment + gh pr checkout で attacker-controlled な PR head を
# trusted context = secrets 付きジョブに持ち込む）を発生させないため。
# 再レビューは新コミット push（synchronize）で自動発火する。
# bot PR は allowed_bots を許可せず、job-level if で成功スキップする。
on:
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review]

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number }}
  cancel-in-progress: true

permissions:
  contents: read
  pull-requests: write
  issues: write
  # 必須: anthropics/claude-code-action は ANTHROPIC_API_KEY 直接認証でも内部で OIDC token を要求する。削除すると fail する
  id-token: write
  actions: read

jobs:
  review:
    name: Claude Code Review
    runs-on: ubuntu-latest
    if: github.event.pull_request.draft == false && github.event.pull_request.user.type == 'User'
    timeout-minutes: 15
    steps:
      # persist-credentials: false で actions/checkout が git credential helper に
      # GITHUB_TOKEN を埋め込まないようにする。zizmor の credential persistence 警告対策。
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0
          persist-credentials: false

      # force-push 検出: 追加コミットレビューとフルレビューの切り替えに使う。
      # GitHub event context の値は env: 経由で渡し、run: 内で直接 ${{ }} 展開しない
      # （zizmor の code injection via template expansion 警告対策）。
      - name: Detect review context
        id: context
        env:
          ACTION: ${{ github.event.action }}
          BEFORE: ${{ github.event.before }}
          AFTER: ${{ github.event.after }}
        run: |
          echo "action=$ACTION" >> "$GITHUB_OUTPUT"

          HEAD_SHA=$(git rev-parse HEAD)
          echo "head_sha=$HEAD_SHA" >> "$GITHUB_OUTPUT"

          if [ "$ACTION" = "synchronize" ]; then
            echo "before=$BEFORE" >> "$GITHUB_OUTPUT"
            echo "after=$AFTER" >> "$GITHUB_OUTPUT"

            if git merge-base --is-ancestor "$BEFORE" "$AFTER" 2>/dev/null; then
              echo "force_push=false" >> "$GITHUB_OUTPUT"
            else
              echo "force_push=true" >> "$GITHUB_OUTPUT"
            fi
          fi

      # anthropics/claude-code-action は OIDC token を app token に交換する際、
      # 実行中の workflow file が default branch と完全一致していることを検証する。
      # そのため、この workflow 自体を変更する PR では action 実行前に skip する。
      - name: Detect claude-review workflow changes
        id: claude_review_workflow
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
        run: |
          if gh pr diff "$PR_NUMBER" --name-only | grep -Fxq ".github/workflows/claude-review.yml"; then
            echo "changed=true" >> "$GITHUB_OUTPUT"
            echo "::notice::.github/workflows/claude-review.yml changed; skipping anthropics/claude-code-action because it requires the workflow file to match the default branch."
          else
            echo "changed=false" >> "$GITHUB_OUTPUT"
          fi

      # 一貫性チェック用の context ファイルを事前に集める。
      # Greptile の embedding ベース検索の代替として、変更ファイルが触る identifier の
      # 既存呼び出し箇所、同階層ファイル、test ペアを grep で抽出する。
      # SKILL.md の Phase 2 (consistency review) でこのファイルを参照する。
      - name: Prepare consistency context
        id: consistency
        continue-on-error: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
        run: |
          set -uo pipefail
          OUT=".claude-review-context.md"
          : > "$OUT"

          # `set -uo pipefail` 下流コマンドが失敗した場合に備えて、output は最初に書き出す。
          # これで CONSISTENCY_CONTEXT_PATH が空文字になることを防ぎ、Claude が Read で空のパスを
          # 開こうとして失敗するリスクを排除する（continue-on-error: true で step 自体は通る）。
          echo "consistency_context_path=$OUT" >> "$GITHUB_OUTPUT"

          {
            echo "# Consistency Review Context"
            echo ""
            echo "PR #${PR_NUMBER} の一貫性レビュー（命名規則・既存パターンへの追従・cross-file 整合）で参照する事前収集メモです。"
            echo "Greptile 不在環境で Claude Code が一貫性チェックを担うため、grep ベースで近傍ファイルと類似パターンを集めています。"
            echo ""
          } >> "$OUT"

          # 変更ファイル一覧（バイナリは除外）
          mapfile -t CHANGED < <(gh pr diff "$PR_NUMBER" --name-only 2>/dev/null \
            | grep -Ev '\.(png|jpg|jpeg|gif|webp|ico|pdf|zip|gz|tar|woff2?|ttf|otf|eot)$' || true)

          if [ "${#CHANGED[@]}" -eq 0 ]; then
            echo "## 変更ファイル: 0 件（context 収集スキップ）" >> "$OUT"
          else
            {
              echo "## 変更ファイル一覧（${#CHANGED[@]} 件）"
              echo ""
              # `--` 必須: format 文字列が `-` 始まりだと bash printf が `- : invalid option` で落ちる
              printf -- '- `%s`\n' "${CHANGED[@]}"
              echo ""
            } >> "$OUT"

            # 同階層の兄弟ファイル（同一ディレクトリの上位 20 件）
            {
              echo "## 同階層の兄弟ファイル（命名規則・既存パターンの参照用）"
              echo ""
            } >> "$OUT"
            declare -A SEEN_DIR=()
            for f in "${CHANGED[@]}"; do
              dir=$(dirname "$f")
              [ -n "${SEEN_DIR[$dir]:-}" ] && continue
              SEEN_DIR[$dir]=1
              echo "### \`$dir/\`" >> "$OUT"
              ls -1 "$dir" 2>/dev/null | head -20 | sed 's/^/- /' >> "$OUT" || true
              echo "" >> "$OUT"
            done

            # test ペア（_test.go / .test.ts / .spec.ts 等）の存在チェック
            {
              echo "## test ペアの有無"
              echo ""
            } >> "$OUT"
            for f in "${CHANGED[@]}"; do
              base="${f%.*}"
              ext="${f##*.}"
              candidates=()
              case "$ext" in
                go) candidates+=("${base}_test.go") ;;
                ts|tsx|js|jsx) candidates+=("${base}.test.${ext}" "${base}.spec.${ext}") ;;
                py) candidates+=("$(dirname "$f")/test_$(basename "$base").py") ;;
              esac
              for c in "${candidates[@]:-}"; do
                [ -z "$c" ] && continue
                if [ -e "$c" ]; then
                  echo "- \`$f\` → test ペアあり: \`$c\`" >> "$OUT"
                else
                  echo "- \`$f\` → test ペアなし（候補: \`$c\`）" >> "$OUT"
                fi
              done
            done
            echo "" >> "$OUT"

            # 変更ファイルの呼び出し元（基本的な grep）
            # トップレベル symbol（公開関数/型）を抽出して、リポ内の参照を最大10件ずつ拾う
            {
              echo "## 変更ファイル内 symbol の参照箇所（最大 10 件/symbol）"
              echo ""
              echo "Claude はこのリスト＋実 grep で十分にカバーできない場合、追加で grep を実行してください。"
              echo ""
            } >> "$OUT"
            for f in "${CHANGED[@]}"; do
              [ -f "$f" ] || continue
              ext="${f##*.}"
              # 言語別の symbol 抽出パターンと、参照検索時の include glob 集合を決定する。
              # ts <-> tsx, js <-> jsx は同じ言語族として相互参照を拾う。
              symbols=""
              INCLUDE_GLOBS=()
              case "$ext" in
                go)
                  INCLUDE_GLOBS=(--include='*.go')
                  symbols=$(grep -E '^(func|type|var|const) [A-Z]' "$f" 2>/dev/null \
                            | sed -E 's/^(func|type|var|const) ([A-Za-z0-9_]+).*/\2/' | sort -u | head -10) ;;
                ts|tsx|js|jsx)
                  INCLUDE_GLOBS=(--include='*.ts' --include='*.tsx' --include='*.js' --include='*.jsx')
                  symbols=$(grep -E '^export (function|class|const|interface|type) [A-Za-z]' "$f" 2>/dev/null \
                            | sed -E 's/^export (function|class|const|interface|type) ([A-Za-z0-9_]+).*/\2/' | sort -u | head -10) ;;
                py)
                  INCLUDE_GLOBS=(--include='*.py')
                  symbols=$(grep -E '^(def|class) [A-Za-z]' "$f" 2>/dev/null \
                            | sed -E 's/^(def|class) ([A-Za-z0-9_]+).*/\2/' | sort -u | head -10) ;;
              esac
              [ -z "$symbols" ] && continue
              echo "### \`$f\`" >> "$OUT"
              while IFS= read -r sym; do
                [ -z "$sym" ] && continue
                refs=$(grep -rln "${INCLUDE_GLOBS[@]}" \
                        --exclude-dir=.git --exclude-dir=node_modules --exclude-dir=vendor \
                        -F "$sym" . 2>/dev/null \
                        | grep -v -F "./$f" | head -10 || true)
                if [ -n "$refs" ]; then
                  echo "- \`$sym\` の参照:" >> "$OUT"
                  echo "$refs" | sed 's/^/  - /' >> "$OUT"
                else
                  echo "- \`$sym\`: 他ファイルからの参照なし（新規 symbol または file-local の可能性）" >> "$OUT"
                fi
              done <<< "$symbols"
              echo "" >> "$OUT"
            done
          fi

          echo "::group::Consistency context (head 200 行)"
          head -200 "$OUT" || true
          echo "::endgroup::"

      # v1.0.94 以降は PR branch 上の .claude/ と .mcp.json を base branch から自動 restore する
      # 防御が入る（attacker-controlled な指示ファイルを Claude に読ませないため）。
      # SKILL.md はこの挙動を前提に書く（`.claude/skills/claude-code-review/SKILL.md` は
      # base branch の内容が読まれる）。
      # mcp__github_inline_comment__create_inline_comment は v1.0.94 以降継続して利用可能。
      - uses: anthropics/claude-code-action@11a9dadd198803a0cea6bd53da3e0e8a762fc6ea # v1.0.108
        if: steps.claude_review_workflow.outputs.changed != 'true'
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          # allowed_bots は default (空) で運用する。Wiz custom rule 459cd9a5
          # (claude-code-action should not use wildcard or dependabot in allowed_bots, HIGH) は
          # dependabot / renovate 双方を Confused Deputy 攻撃ベクトルとして検出する。
          # @dependabot recreate / @renovate run 経由の actor 偽装や、依存パッケージ release note
          # 経由の prompt injection を防ぐため、bot PR は Claude レビュー対象外とし人間レビューに委ねる。
          # 参考: https://www.wiz.io/blog/github-actions-security-ai-powered-actions-vulnerabilities
          # bot コメントを Claude のコンテキストから除外
          exclude_comments_by_actor: "*[bot]"
          display_report: true
          prompt: |
            REPO: ${{ github.repository }}
            PR NUMBER: ${{ github.event.pull_request.number }}
            EVENT_ACTION: ${{ steps.context.outputs.action || github.event.action }}
            HEAD_SHA: ${{ steps.context.outputs.head_sha }}
            BEFORE_SHA: ${{ steps.context.outputs.before }}
            AFTER_SHA: ${{ steps.context.outputs.after }}
            FORCE_PUSH: ${{ steps.context.outputs.force_push }}
            CONSISTENCY_CONTEXT_PATH: ${{ steps.consistency.outputs.consistency_context_path }}

            PR ブランチは既にカレントディレクトリにチェックアウト済みです。
            `.claude/skills/claude-code-review/SKILL.md` を Read で読み込み、その内容に従ってこのPRをレビューしてください。
            一貫性レビュー (Phase 2) では、上記 `CONSISTENCY_CONTEXT_PATH` のファイルを Read で読んでから判定してください。
          claude_args: |
            --model claude-opus-4-7
            --max-turns 50
            --disallowedTools "Edit,Write,NotebookEdit,Bash(git commit:*),Bash(git push:*),Bash(git checkout:*),Bash(git reset:*),Bash(git rebase:*),Bash(git branch:*),Bash(git tag:*)"
            --allowedTools "mcp__github_inline_comment__create_inline_comment,Read,Bash(gh pr comment:*),Bash(gh pr diff:*),Bash(gh pr view:*),Bash(gh pr review:*),Bash(gh api repos/*/issues/*/comments:*),Bash(gh api --method PATCH repos/*/issues/comments/*:*),Bash(find:*),Bash(cat:*),Bash(grep:*),Bash(ls:*),Bash(git diff:*),Bash(git log:*),WebSearch,WebFetch(domain:pkg.go.dev),WebFetch(domain:github.com),WebFetch(domain:raw.githubusercontent.com)"
