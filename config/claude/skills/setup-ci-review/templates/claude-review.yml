name: PR Review (Claude Code)

on:
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review]
  issue_comment:
    types: [created]

concurrency:
  group: claude-review-${{ github.event.pull_request.number || github.event.issue.number }}
  cancel-in-progress: true

permissions:
  contents: read
  pull-requests: write
  issues: write
  id-token: write

jobs:
  review:
    name: Claude Code Review
    runs-on: ubuntu-latest
    if: |
      (github.event_name == 'pull_request' && github.event.pull_request.draft == false) ||
      (github.event_name == 'issue_comment' && github.event.issue.pull_request &&
       contains(github.event.comment.body, '@claude') &&
       (github.event.comment.author_association == 'MEMBER' || github.event.comment.author_association == 'OWNER' || github.event.comment.author_association == 'COLLABORATOR'))
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0

      - uses: anthropics/claude-code-action@38ec876110f9fbf8b950c79f534430740c3ac009 # v1.0.101
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          display_report: true
          prompt: |
            あなたは {{REVIEWER_ROLE}} です。このPRをレビューしてください。

            ## 役割

            1. トリアージ: diff サイズ・変更パス・影響範囲を分類
            2. ロジック・設計レビュー: セキュリティ、設計の妥当性
            3. 既存コードとの一貫性チェックは Greptile が担当するため、そちらには踏み込まない

            {{REVIEW_CRITERIA}}

            ## 優先度ラベル

            - [P0] 本番障害・セキュリティリスクに直結
            - [P1] 運用障害・設定不整合のリスク
            - [P2] コード品質・保守性の改善
            - [P3] 軽微な改善提案

            ## 出力ルール

            - 日本語（ですます調）で記述
            - 指摘には具体的な修正案またはコード例を含める
            - P2/P3 の指摘は合計 5 件以内
            - CI/linter で検出可能な問題はレビュー対象外
            - 自信がない指摘はしない
            - 問題がなければ approve する。P0/P1 の問題があれば request changes する

            ## 出力形式

            1行目: サマリ（P0: N件, P1: N件, P2: N件, P3: N件）
            2行目以降: 優先度順に指摘を列挙
          claude_args: |
            --max-turns 15
            --allowedTools "Bash(gh pr view:*),Bash(gh pr diff:*),Bash(gh pr review --approve:*),Bash(gh pr review --request-changes:*),Bash(gh pr review --comment:*),Bash(gh pr comment:*),Bash(find:*),Bash(cat:*),Bash(grep:*),Bash(ls:*),Bash(git diff:*),Bash(git log:*)"
